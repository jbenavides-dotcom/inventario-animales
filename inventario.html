<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Animales — Inventario LP&ET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="inventario">
    <div class="app-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">🐄 Inventario LP&ET</h2>
                <button class="sidebar-toggle" onclick="App.toggleSidebar()">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="inventario.html" class="sidebar-nav-item active" data-page="inventario">
                    <span class="nav-icon">🐾</span>
                    <span class="nav-label">Inventario</span>
                </a>
                <a href="ordenes.html" class="sidebar-nav-item" data-page="ordenes">
                    <span class="nav-icon">💰</span>
                    <span class="nav-label">Compras/Ventas</span>
                </a>
                <a href="salud.html" class="sidebar-nav-item" data-page="salud">
                    <span class="nav-icon">💉</span>
                    <span class="nav-label">Salud</span>
                </a>
                <a href="costos.html" class="sidebar-nav-item" data-page="costos">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Costos</span>
                </a>
                <a href="huevos.html" class="sidebar-nav-item" data-page="huevos">
                    <span class="nav-icon">🥚</span>
                    <span class="nav-label">Huevos</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="export-import-bar">
                    <button class="btn btn-sm btn-secondary" onclick="App.exportData()" title="Exportar datos">📥 Exportar</button>
                    <label class="btn btn-sm btn-secondary" title="Importar datos">
                        📤 Importar
                        <input type="file" accept=".json" onchange="App.handleImport(event)" style="display:none">
                    </label>
                </div>
            </div>
        </aside>

        <!-- BOTTOM NAV (mobile) -->
        <nav class="bottom-nav" id="bottomNav">
            <a href="index.html" class="bottom-nav-item"><span>📊</span><span>Dashboard</span></a>
            <a href="inventario.html" class="bottom-nav-item active"><span>🐾</span><span>Inventario</span></a>
            <a href="ordenes.html" class="bottom-nav-item"><span>💰</span><span>Compras</span></a>
            <a href="salud.html" class="bottom-nav-item"><span>💉</span><span>Salud</span></a>
            <a href="costos.html" class="bottom-nav-item"><span>📋</span><span>Costos</span></a>
            <a href="huevos.html" class="bottom-nav-item"><span>🥚</span><span>Huevos</span></a>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="page-header">
                <h1>Inventario de Animales</h1>
                <button class="btn btn-primary" id="btn-add-animal">+ Nuevo Animal</button>
            </div>

            <div class="filter-bar">
                <input type="text" class="form-control search-input" id="search-animal" placeholder="Buscar por nombre o ID...">
                <select class="form-select" id="filter-tipo">
                    <option value="">Todos los tipos</option>
                    <option>Bovino</option><option>Equino</option><option>Ave</option>
                    <option>Porcino</option><option>Canino</option><option>Felino</option>
                    <option>Caprino</option><option>Ovino</option><option>Otro</option>
                </select>
                <select class="form-select" id="filter-estado">
                    <option value="">Todos los estados</option>
                    <option>Activo</option><option>Vendido</option><option>Fallecido</option>
                    <option>En tratamiento</option><option>Cuarentena</option><option>Prestado</option>
                </select>
                <select class="form-select" id="filter-sexo">
                    <option value="">Ambos sexos</option>
                    <option>Macho</option><option>Hembra</option>
                </select>
            </div>

            <div class="card" id="inventario-table"></div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal container -->
    <div id="modalContainer"></div>

    <!-- Scripts -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/charts.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
